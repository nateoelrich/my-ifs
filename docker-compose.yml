services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ifs
      MONGO_INITDB_ROOT_PASSWORD: ifs_dev
      MONGO_INITDB_DATABASE: my_ifs
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/my_ifs --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    ports:
      - "5050:5050"
    environment:
      ASPNETCORE_HTTP_PORTS: "5050"
      ConnectionStrings__MongoDB: "mongodb://ifs:ifs_dev@mongo:27017/my_ifs?authSource=admin"
      Cors__AllowedOrigins: "http://localhost:3000"
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
